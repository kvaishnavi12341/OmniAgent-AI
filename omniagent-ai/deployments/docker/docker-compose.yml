version: "3.9"

services:
  backend:
    build: .
    container_name: omni-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - ollama

  ui:
    image: python:3.11
    working_dir: /app
    volumes:
      - .:/app
    command: streamlit run ui/streamlit_app.py
    ports:
      - "8501:8501"

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
  
  build:
    context: .
    dockerfile: deployments/docker/Dockerfile
  
  nginx:
    image: nginx:latest
    container_name: omni-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend