apiVersion: apps/v1
kind: Deployment
metadata:
  name: omniagent-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: omniagent
  template:
    metadata:
      labels:
        app: omniagent
    spec:
      containers:
      - name: omniagent
        image: omniagent-ai:latest
        ports:
        - containerPort: 8000